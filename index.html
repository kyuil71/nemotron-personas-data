<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국인 페르소나 추출기</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- 엑셀(.xlsx) 생성 라이브러리 (SheetJS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>🇰🇷 한국인 페르소나 추출기</h1>
    <p class="sub">
      NVIDIA <code>Nemotron-Personas-Korea</code> 데이터에서 원하는 특성을 골라
      최대 <b>1,000명</b>을 수집하고 엑셀로 저장합니다.
    </p>
  </header>

  <main class="wrap">
    <!-- 상태 배너 -->
    <div id="banner" class="banner">데이터 정보를 불러오는 중…</div>

    <!-- 필터 영역 (JS가 채움) -->
    <section class="card">
      <h2>1. 특성 선택</h2>
      <div id="filters" class="filters"></div>
      <button id="resetBtn" class="btn ghost small">필터 초기화</button>
    </section>

    <!-- 수집 옵션 -->
    <section class="card">
      <h2>2. 수집 옵션</h2>
      <div class="options">
        <label>최대 인원
          <input id="maxN" type="number" min="1" max="1000" value="1000" step="50" />
        </label>
        <label>수집 방식
          <select id="mode">
            <option value="head">처음부터 순서대로</option>
            <option value="random">무작위 위치에서 수집</option>
          </select>
        </label>
        <details class="adv">
          <summary>고급 설정 (선택)</summary>
          <label class="token">Hugging Face 토큰
            <input id="token" type="password" placeholder="hf_… (선택 사항, 속도·안정성 향상)" />
          </label>
          <small>토큰은 브라우저 메모리에만 임시 저장되며 어디에도 전송·저장되지 않습니다(HF API 제외).</small>
        </details>
      </div>
    </section>

    <!-- 실행 -->
    <section class="card run">
      <button id="runBtn" class="btn primary">🔎 수집하기</button>
      <button id="downloadBtn" class="btn success" disabled>📥 엑셀(.xlsx) 저장</button>
      <div id="progress" class="progress"></div>
    </section>

    <!-- 미리보기 -->
    <section class="card" id="previewCard" hidden>
      <h2>미리보기 <span id="previewCount" class="muted"></span></h2>
      <div class="tablewrap">
        <table id="previewTable"></table>
      </div>
    </section>
  </main>

  <footer class="foot">
    데이터 출처: <a href="https://huggingface.co/datasets/nvidia/Nemotron-Personas-Korea" target="_blank" rel="noopener">nvidia/Nemotron-Personas-Korea</a> (CC BY 4.0) ·
    통계 기반 합성 데이터이며 실제 개인정보가 아닙니다.
  </footer>

  <script src="app.js"></script>
</body>
</html>
